  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e=\"margin-top:13px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.55;letter-spacing:0.04em;color:#8a8d93;text-transform:uppercase;\">Each dot represents a contributing author. Placement is illustrative, not a precise location.<\u002Fdiv>\n      <div style=\"margin-top:28px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e7e8ea;border:1px solid #e7e8ea;border-radius:4px;overflow:hidden;\">\n        <div style=\"background:#fff;padding:22px 24px;\">\n          <div style=\"font-size:34px;font-weight:800;letter-spacing:-0.02em;color:#0a0a0b;line-height:1;\">73,000<\u002Fdiv>\n          <div style=\"margin-top:9px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.07em;color:#8a8d93;text-transform:uppercase;\">Contributing authors<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;padding:22px 24px;\">\n          <div style=\"font-size:34px;font-weight:800;letter-spacing:-0.02em;color:#0a0a0b;line-height:1;\">1,100,000<\u002Fdiv>\n          <div style=\"margin-top:9px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.07em;color:#8a8d93;text-transform:uppercase;\">Published works<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;padding:22px 24px;\">\n          <div style=\"font-size:34px;font-weight:800;letter-spacing:-0.02em;color:#0a0a0b;line-height:1;\">43,000<\u002Fdiv>\n          <div style=\"margin-top:9px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.07em;color:#8a8d93;text-transform:uppercase;\">Publications<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===== ABOUT VIEW ===== -->\n  <sc-if value=\"{{ isAbout }}\" hint-placeholder-val=\"{{ false }}\">\n    <main style=\"max-width:1240px;margin:0 auto;padding:36px 32px 96px;\">\n      <div style=\"display:flex;align-items:center;gap:9px;font-size:12.5px;color:#8a8d93;margin-bottom:30px;\">\n        <a onclick=\"{{ goLibrary }}\" style=\"color:#8a8d93;text-decoration:none;cursor:pointer;\">LexBlog<\u002Fa>\n        <span style=\"color:#c4c6cb;\">/<\u002Fspan>\n        <a onclick=\"{{ goLibrary }}\" style=\"color:#8a8d93;text-decoration:none;cursor:pointer;\">Library<\u002Fa>\n        <span style=\"color:#c4c6cb;\">/<\u002Fspan>\n        <span style=\"color:#16181c;font-weight:500;\">About<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"max-width:860px;\">\n        <h1 style=\"margin:0;font-size:46px;font-weight:800;letter-spacing:-0.03em;line-height:1.04;color:#0a0a0b;\">About The Library at LexBlog<\u002Fh1>\n        <div style=\"margin-top:26px;display:flex;flex-direction:column;gap:14px;font-size:21px;line-height:1.5;color:#3a3d44;font-weight:400;\">\n          <p>No one preserves the published insight of legal professionals, nor structures it for citation as secondary law.<\u002Fp>\n          <p style=\"color:#0a0a0b;font-weight:500;\">The Library at LexBlog will.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:58px;max-width:900px;display:flex;flex-direction:column;gap:52px;\">\n        <sc-for list=\"{{ aboutSections }}\" as=\"sec\" hint-placeholder-count=\"6\">\n          <section>\n            <h2 style=\"margin:0 0 20px;font-size:27px;font-weight:700;letter-spacing:-0.02em;color:#0a0a0b;\">{{ sec.num }}&nbsp;&nbsp;{{ sec.title }}<\u002Fh2>\n            <div style=\"display:flex;flex-direction:column;gap:18px;font-size:17.5px;line-height:1.72;color:#33363c;\">\n              <sc-for list=\"{{ sec.paras }}\" as=\"para\" hint-placeholder-count=\"2\">\n                <p>{{ para }}<\u002Fp>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ sec.cta }}\" hint-placeholder-val=\"{{ false }}\">\n                <a onclick=\"{{ goSubmit }}\" style=\"align-self:flex-start;display:inline-flex;align-items:center;text-decoration:none;background:#0a0a0b;color:#ffffff;font-size:15.5px;font-weight:600;padding:14px 26px;border-radius:4px;cursor:pointer;\" style-hover=\"background:#26282d;\">Submit your publishing here<\u002Fa>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===== SUBMIT VIEW ===== -->\n  <sc-if value=\"{{ isSubmit }}\" hint-placeholder-val=\"{{ false }}\">\n    <main style=\"max-width:760px;margin:0 auto;padding:36px 32px 96px;\">\n      <div style=\"display:flex;align-items:center;gap:9px;font-size:12.5px;color:#8a8d93;margin-bottom:30px;\">\n        <a onclick=\"{{ goLibrary }}\" style=\"color:#8a8d93;text-decoration:none;cursor:pointer;\">LexBlog<\u002Fa>\n        <span style=\"color:#c4c6cb;\">/<\u002Fspan>\n        <a onclick=\"{{ goLibrary }}\" style=\"color:#8a8d93;text-decoration:none;cursor:pointer;\">Library<\u002Fa>\n        <span style=\"color:#c4c6cb;\">/<\u002Fspan>\n        <span style=\"color:#16181c;font-weight:500;\">Submit<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n        <h1 style=\"margin:0;font-size:46px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:#0a0a0b;\">Submit your publishing<\u002Fh1>\n        <span style=\"display:inline-flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.02em;color:#1f8a3b;background:#e8f6ed;border:1px solid #bfe6cc;border-radius:4px;padding:5px 11px;\">Free<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin-top:22px;font-size:19px;line-height:1.55;color:#3a3d44;\">The Library welcomes blog and website feeds and individual published works, including articles, alerts, and white papers, from legal professionals advancing the understanding of the law, whether hosted on LexBlog or elsewhere on the web.<\u002Fp>\n      <div style=\"margin-top:38px;display:flex;gap:30px;border-bottom:1px solid #e7e8ea;\">\n        <button onclick=\"{{ selectSingle }}\" style=\"{{ singleTabStyle }}\">A single published work<\u002Fbutton>\n        <button onclick=\"{{ selectFeed }}\" style=\"{{ feedTabStyle }}\">A publication feed&nbsp;*<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"margin-top:24px;font-size:16px;line-height:1.6;color:#54585f;\">{{ helperText }}<\u002Fp>\n      <div style=\"margin-top:26px;display:flex;flex-direction:column;gap:22px;\">\n        <div>\n          <label style=\"display:block;font-size:14px;font-weight:600;color:#16181c;margin-bottom:9px;\">Your name<\u002Flabel>\n          <input type=\"text\" placeholder=\"Jane Carter\" style=\"width:100%;height:50px;border:1px solid #d9dbdf;border-radius:5px;background:#fff;font-family:'Archivo',sans-serif;font-size:16px;color:#16181c;padding:0 16px;outline:none;\" style-focus=\"border-color:#0a0a0b;\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block;font-size:14px;font-weight:600;color:#16181c;margin-bottom:9px;\">Email<\u002Flabel>\n          <input type=\"email\" placeholder=\"name@firm.com\" style=\"width:100%;height:50px;border:1px solid #d9dbdf;border-radius:5px;background:#fff;font-family:'Archivo',sans-serif;font-size:16px;color:#16181c;padding:0 16px;outline:none;\" style-focus=\"border-color:#0a0a0b;\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block;font-size:14px;font-weight:600;color:#16181c;margin-bottom:9px;\">{{ urlLabel }}<\u002Flabel>\n          <input type=\"url\" placeholder=\"https://...\" style=\"width:100%;height:50px;border:1px solid #d9dbdf;border-radius:5px;background:#fff;font-family:'Archivo',sans-serif;font-size:16px;color:#16181c;padding:0 16px;outline:none;\" style-focus=\"border-color:#0a0a0b;\">\n        <\u002Fdiv>\n        <div style=\"margin-top:6px;display:flex;align-items:center;gap:16px;\">\n          <button onclick=\"{{ goSubmitted }}\" style=\"display:inline-flex;align-items:center;background:#0a0a0b;color:#fff;border:none;font-family:'Archivo',sans-serif;font-size:15.5px;font-weight:600;padding:15px 28px;border-radius:5px;cursor:pointer;\" style-hover=\"background:#26282d;\">{{ submitLabel }}<\u002Fbutton>\n          <span style=\"font-size:13.5px;color:#8a8d93;\">Free submission. No account required.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:44px;background:#f3f4f5;border:1px solid #e2e3e5;border-radius:6px;padding:18px 20px;\">\n        <p style=\"font-size:14.5px;line-height:1.6;color:#54585f;\"><span style=\"font-weight:700;color:#16181c;\">* Build note:<\u002Fspan> Free feed intake on this page is not how lexblog.com works today, where feed ingestion runs through the Author Record. Treat the feed path as new functionality that likely requires development at some point, not necessarily now, if we decide this work is appropriate.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===== SUBMITTED (SPLASH) VIEW ===== -->\n  <sc-if value=\"{{ isSubmitted }}\" hint-placeholder-val=\"{{ false }}\">\n    <main style=\"max-width:760px;margin:0 auto;padding:54px 32px 96px;\">\n      <div style=\"display:flex;align-items:center;gap:18px;\">\n        <span style=\"width:46px;height:46px;border-radius:50%;background:#cdeed4;display:flex;align-items:center;justify-content:center;flex:none;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1f8a3b\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"4 12 10 18 20 6\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fspan>\n        <h1 style=\"margin:0;font-size:44px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:#0a0a0b;\">Your publishing is in.<\u002Fh1>\n      <\u002Fdiv>\n      <p style=\"margin-top:26px;font-size:20px;line-height:1.55;color:#3a3d44;\">We received your submission and will review it for relevance before adding it to the Library. You will hear from us at the email you provided.<\u002Fp>\n      <div style=\"margin-top:42px;background:#0a0a0b;border-radius:14px;padding:40px 42px 44px;color:#ffffff;\">\n        <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.18em;color:#9a9da3;text-transform:uppercase;\">Do more than one piece<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;font-size:14.5px;font-weight:600;color:#16181c;background:#d7d8da;border-radius:20px;padding:5px 15px;\">$19/month · $199/year<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"margin:22px 0 0;font-size:33px;font-weight:800;letter-spacing:-0.025em;line-height:1.12;color:#ffffff;max-width:560px;\">Connect everything you publish, and make it citable.<\u002Fh2>\n        <p style=\"margin-top:22px;font-size:17.5px;line-height:1.62;color:#b6b8bd;max-width:620px;\">You just added one piece. An Author Record ties your full body of work to one verified identity, so your publishing establishes your authority across the legal research platforms (HeinOnline, vLex/Clio, and others) and LLMs, and all of it becomes citable.<\u002Fp>\n        <a onclick=\"{{ goAuthor }}\" style=\"margin-top:32px;align-self:flex-start;display:inline-flex;align-items:center;text-decoration:none;background:#ffffff;color:#0a0a0b;font-size:16.5px;font-weight:600;padding:17px 30px;border-radius:8px;cursor:pointer;\" style-hover=\"background:#e8e9ea;\">Get an Author Record — $19/month<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"margin-top:34px;display:flex;align-items:center;gap:36px;\">\n        <a onclick=\"{{ goSubmit }}\" style=\"font-size:16px;font-weight:500;color:#16181c;text-decoration:none;cursor:pointer;\" style-hover=\"color:#8a8d93;\">Submit another piece<\u002Fa>\n        <a onclick=\"{{ goLibrary }}\" style=\"font-size:16px;font-weight:500;color:#16181c;text-decoration:none;cursor:pointer;\" style-hover=\"color:#8a8d93;\">Back to the Library<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===== AUTHOR RECORD VIEW ===== -->\n  <sc-if value=\"{{ isAuthor }}\" hint-placeholder-val=\"{{ false }}\">\n    <main style=\"max-width:1000px;margin:0 auto;padding:40px 32px 80px;\">\n      <div style=\"display:flex;align-items:center;gap:9px;font-size:12.5px;color:#8a8d93;margin-bottom:30px;\">\n        <a onclick=\"{{ goLibrary }}\" style=\"color:#8a8d93;text-decoration:none;cursor:pointer;\">LexBlog<\u002Fa>\n        <span style=\"color:#c4c6cb;\">/<\u002Fspan>\n        <a onclick=\"{{ goLibrary }}\" style=\"color:#8a8d93;text-decoration:none;cursor:pointer;\">Library<\u002Fa>\n        <span style=\"color:#c4c6cb;\">/<\u002Fspan>\n        <span style=\"color:#16181c;font-weight:500;\">Author Record<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"margin:0;font-size:46px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:#0a0a0b;\">Get an Author Record<\u002Fh1>\n      <p style=\"margin-top:26px;font-size:23px;font-weight:600;letter-spacing:-0.01em;color:#0a0a0b;\">Your work counts. Make it recognized, and make it last.<\u002Fp>\n      <p style=\"margin-top:14px;font-size:19px;line-height:1.55;color:#54585f;max-width:760px;\">Submitting your work is free. An Author Record is how you support the Library that preserves it, and how you secure verified authority over your own body of work.<\u002Fp>\n      <div style=\"margin-top:36px;background:#0a0a0b;border-radius:16px;padding:40px 44px 38px;\">\n        <p style=\"font-size:23px;font-weight:600;line-height:1.4;letter-spacing:-0.01em;color:#ffffff;max-width:820px;\">With an Author Record, your publishing establishes your authority for the legal research platforms (HeinOnline, vLex/Clio, and others) and LLMs, and your publishing becomes citable.<\u002Fp>\n        <p style=\"margin-top:20px;font-size:18px;line-height:1.55;color:#9a9da3;max-width:760px;\">These platforms already receive Library publishing, with more partners coming.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"margin-top:48px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.16em;color:#8a8d93;text-transform:uppercase;\">Each record contains ten fields<\u002Fdiv>\n      <div style=\"margin-top:20px;border:1px solid #e7e8ea;border-radius:8px;overflow:hidden;\">\n        <sc-for list=\"{{ fieldRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #e7e8ea;\">\n            <div style=\"padding:21px 26px;font-size:17px;color:#16181c;border-right:1px solid #e7e8ea;\">{{ row.a }}<\u002Fdiv>\n            <div style=\"padding:21px 26px;font-size:17px;color:#16181c;\">{{ row.b }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:42px;display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n        <div style=\"border:1px solid #e2e3e5;background:#fafafb;border-radius:12px;padding:30px 30px 32px;display:flex;flex-direction:column;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.16em;color:#8a8d93;text-transform:uppercase;\">Monthly<\u002Fdiv>\n          <div style=\"margin-top:18px;display:flex;align-items:baseline;gap:2px;\">\n            <span style=\"font-size:46px;font-weight:800;letter-spacing:-0.03em;color:#0a0a0b;line-height:1;\">$19<\u002Fspan>\n            <span style=\"font-size:18px;color:#8a8d93;\">/month<\u002Fspan>\n          <\u002Fdiv>\n          <a style=\"margin-top:26px;display:flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid #d2d4d8;background:#ffffff;border-radius:8px;height:54px;font-size:16px;font-weight:600;color:#16181c;cursor:pointer;\" style-hover=\"border-color:#0a0a0b;\">Choose monthly<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"border:1.5px solid #0a0a0b;background:#ffffff;border-radius:12px;padding:30px 30px 32px;display:flex;flex-direction:column;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.16em;color:#8a8d93;text-transform:uppercase;\">Annual<\u002Fdiv>\n            <span style=\"font-size:13px;font-weight:600;color:#ffffff;background:#0a0a0b;border-radius:20px;padding:5px 13px;\">Save $29<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top:18px;display:flex;align-items:baseline;gap:2px;\">\n            <span style=\"font-size:46px;font-weight:800;letter-spacing:-0.03em;color:#0a0a0b;line-height:1;\">$199<\u002Fspan>\n            <span style=\"font-size:18px;color:#8a8d93;\">/year<\u002Fspan>\n          <\u002Fdiv>\n          <a style=\"margin-top:26px;display:flex;align-items:center;justify-content:center;text-decoration:none;background:#0a0a0b;border-radius:8px;height:54px;font-size:16px;font-weight:600;color:#ffffff;cursor:pointer;\" style-hover=\"background:#26282d;\">Choose annual<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px;padding-top:30px;border-top:1px solid #e7e8ea;\">\n        <p style=\"font-size:16.5px;line-height:1.6;color:#54585f;\">For law firms with multiple authors, please contact the Library at LexBlog at <a href=\"tel:18009130988\" style=\"color:#16181c;text-decoration:underline;text-underline-offset:3px;\">1-800-913-0988<\u002Fa> or <a href=\"mailto:library@lexblog.com\" style=\"color:#16181c;text-decoration:underline;text-underline-offset:3px;\">library@lexblog.com<\u002Fa>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = { view: 'library', tab: 'single' };\n\n  go(view) {\n    this.setState({ view });\n    if (typeof window !== 'undefined' && window.scrollTo) window.scrollTo(0, 0);\n  }\n\n  renderVals() {\n    const v = this.state.view;\n    const isFeed = this.state.tab === 'feed';\n\n    const navBase = \"color:rgba(255,255,255,0.82);text-decoration:none;font-size:15px;font-weight:500;cursor:pointer;\";\n    const navActive = \"color:#ffffff;text-decoration:none;font-size:15px;font-weight:600;border-bottom:2px solid #ffffff;padding-bottom:3px;cursor:pointer;\";\n\n    const tabBase = \"background:none;border:none;font-family:'Archivo',sans-serif;font-size:17px;letter-spacing:-0.01em;padding:0 0 16px;margin-bottom:-1px;cursor:pointer;\";\n    const tabActive = tabBase + \"color:#0a0a0b;font-weight:700;border-bottom:2px solid #0a0a0b;\";\n    const tabIdle = tabBase + \"color:#8a8d93;font-weight:500;border-bottom:2px solid transparent;\";\n\n    return {\n      isLibrary: v === 'library',\n      isAbout: v === 'about',\n      isSubmit: v === 'submit',\n      isSubmitted: v === 'submitted',\n      isAuthor: v === 'authorrecord',\n\n      aboutNavStyle: v === 'about' ? navActive : navBase,\n      submitNavStyle: (v === 'submit' || v === 'submitted') ? navActive : navBase,\n      authorNavStyle: v === 'authorrecord' ? navActive : navBase,\n\n      goLibrary: () => this.go('library'),\n      goAbout: () => this.go('about'),\n      goSubmit: () => this.go('submit'),\n      goSubmitted: () => this.go('submitted'),\n      goAuthor: () => this.go('authorrecord'),\n\n      // submit tabs\n      singleTabStyle: isFeed ? tabIdle : tabActive,\n      feedTabStyle: isFeed ? tabActive : tabIdle,\n      helperText: isFeed\n        ? 'Submit a publication feed (RSS or blog URL). New publishing is ingested automatically as it is published, then reviewed for relevance.'\n        : 'Submit one published piece, an article, alert, or white paper. It is reviewed for relevance, then added to the collection.',\n      urlLabel: isFeed ? 'Feed or publication URL' : 'URL of the published work',\n      submitLabel: isFeed ? 'Submit this feed' : 'Submit this work',\n      selectSingle: () => this.setState({ tab: 'single' }),\n      selectFeed: () => this.setState({ tab: 'feed' }),\n\n      aboutSections: [\n        { num: '1.', title: 'Why the Library Exists', paras: [\n          'Legal professionals have been publishing insight and commentary online for more than twenty years. Much of it is not being kept. When authors leave firms, websites are rebuilt, publishing is purged for SEO reasons, or URLs change, that expertise is often lost with it.',\n          'Traditional legal publishing is preserved and cited. The working insight of legal professionals, commentary explaining how the law actually operates, often is not. Every major category of legal knowledge has citation infrastructure except practitioner commentary.',\n          'AI systems will increasingly interpret primary law. Without the insight and commentary of legal professionals, that interpretation risks lacking the practical authority and context through which the law actually operates.',\n        ] },\n        { num: '2.', title: 'What the Library Does', paras: [\n          'The Library at LexBlog preserves and structures legal professional publishing as citable secondary law. Using AI-assisted tools, we help capture, organize, and structure legal professional publishing for legal research and citation.',\n          'Publishing may come from LexBlog-hosted publications or from elsewhere on the web, with attribution and links back to the original source.',\n        ] },\n        { num: '3.', title: 'Author Records', paras: [\n          'The Library organizes publishing around verified Author Records designed to connect legal professionals with their complete body of published work.',\n          'Each Author Record is modeled after the Library of Congress Name Authority Record and contains ten fields: photo, authorized name, firm or organization, practice areas, jurisdictions, law school, bar admissions, professional bio, Author Record ID, and a structured link to the author\\u2019s complete body of published work in the Library.',\n          'The Author Record and accompanying publishing are designed to provide durable attribution, professional context, and durable signals of authority for legal professionals, researchers, legal research platforms, and eventually AI systems.',\n        ] },\n        { num: '4.', title: 'Research Platform Partners', paras: [\n          'Legal professional-authored publishing in the Library is being structured and delivered for retrieval, discovery, and citation across leading legal research platforms.',\n          'Early publishing and research partners receiving Library feeds include HeinOnline and Clio/vLex.',\n        ] },\n        { num: '5.', title: 'Why It Matters', paras: [\n          'The law does not live only in cases and statutes. It also lives in the daily insight, analysis, explanation, and experience shared by legal professionals. The bankruptcy lawyer writing about the realities of her district. The employment lawyer explaining changes in state law as they happen. The trial lawyer documenting practical strategy developed over decades.',\n          'Too often, that work disappears.',\n          'The Library at LexBlog exists so legal professional-authored insight becomes part of the enduring legal record, not lost history.',\n        ] },\n        { num: '6.', title: 'Submit Your Publishing', cta: true, paras: [\n          'The Library welcomes blogs, articles, alerts, white papers, publications, and blog feeds from legal professionals and organizations advancing the understanding of the law, whether hosted on LexBlog or elsewhere on the web.',\n        ] },\n      ],\n\n      fieldRows: [\n        { a: 'Photo', b: 'Authorized name' },\n        { a: 'Firm or organization', b: 'Practice areas' },\n        { a: 'Jurisdictions', b: 'Law school' },\n        { a: 'Bar admissions', b: 'Professional bio' },\n        { a: 'Author Record ID', b: 'Link to complete body of work' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
